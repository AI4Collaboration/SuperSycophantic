<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1040" viewBox="0 0 2000 1040" role="img" aria-labelledby="title desc">
  <title id="title">SuperSycophantic framework diagram</title>
  <desc id="desc">Two-row framework diagram with pre-hoc and post-hoc stages, showing a context layer, verifiability, Cialdini-based triggers, Jones ingratiation types, evaluation modes, and Kelman mechanisms.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf2fb"/>
      <stop offset="100%" stop-color="#e1efef"/>
    </linearGradient>

    <radialGradient id="mistPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d9cbff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d9cbff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="mistTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cce7e5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cce7e5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="preBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e7fb" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d9ece7" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="postBand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3edf6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e1e8fa" stop-opacity="0.88"/>
    </linearGradient>

    <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f8fd"/>
      <stop offset="100%" stop-color="#edf5f7"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#2d4f67" flood-opacity="0.12"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#2d4f67" flood-opacity="0.08"/>
    </filter>

    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5.1" refY="3" orient="auto">
      <path d="M 0.9 0.9 L 5.1 3 L 0.9 5.1" fill="none" stroke="#577794" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <g id="icon-stem" fill="none" stroke="#4a6aa4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="5" fill="#4a6aa4" stroke="none"/>
      <ellipse cx="0" cy="0" rx="18" ry="8"/>
      <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="18" ry="8" transform="rotate(120)"/>
    </g>

    <g id="icon-med" fill="none" stroke="#d74c4c" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="17" stroke-width="2.3"/>
      <path d="M 0 -9 V 9" stroke-width="5.8"/>
      <path d="M -9 0 H 9" stroke-width="5.8"/>
    </g>

    <g id="icon-social" fill="none" stroke="#7c5ae6" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-11" cy="-5" r="5"/>
      <circle cx="0" cy="-10" r="6"/>
      <circle cx="12" cy="-4" r="5"/>
      <path d="M -20 12 C -19 5, -14 2, -8 2 C -2 2, 2 5, 3 12"/>
      <path d="M -10 14 C -9 5, -3 0, 4 0 C 11 0, 17 5, 18 14"/>
      <path d="M 2 12 C 3 5, 8 2, 14 2 C 20 2, 25 5, 26 12"/>
    </g>

    <g id="icon-humanities" fill="none" stroke="#5b8c6b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -18 -12 C -8 -14 -3 -12 0 -7 V 16 C -5 11 -10 10 -18 10 Z"/>
      <path d="M 18 -12 C 8 -14 3 -12 0 -7 V 16 C 5 11 10 10 18 10 Z"/>
      <path d="M 0 -7 V 16"/>
    </g>

  </defs>

  <rect width="2000" height="1040" fill="url(#bg)"/>

  <ellipse cx="220" cy="160" rx="280" ry="120" fill="url(#mistPurple)"/>
  <ellipse cx="1760" cy="150" rx="250" ry="118" fill="url(#mistTeal)"/>
  <ellipse cx="220" cy="905" rx="260" ry="112" fill="url(#mistTeal)" opacity="0.55"/>
  <ellipse cx="1790" cy="895" rx="250" ry="106" fill="url(#mistPurple)" opacity="0.5"/>

  <rect x="120" y="66" width="1760" height="324" rx="42" fill="url(#preBand)" stroke="#cad8ee" stroke-opacity="0.7"/>
  <rect x="120" y="496" width="1760" height="324" rx="42" fill="url(#postBand)" stroke="#c8d7ea" stroke-opacity="0.7"/>

  <g filter="url(#softShadow)" font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800">
    <rect x="44" y="28" width="176" height="46" rx="23" fill="#e3e8fa" stroke="#6e88cf" stroke-width="2.2"/>
    <text x="132" y="57" text-anchor="middle" font-size="22" letter-spacing="2.5" fill="#111111">PRE-HOC</text>

    <rect x="44" y="454" width="176" height="46" rx="23" fill="#e3e8fa" stroke="#6e88cf" stroke-width="2.2"/>
    <text x="132" y="483" text-anchor="middle" font-size="22" letter-spacing="2.5" fill="#111111">POST-HOC</text>
  </g>

  <g fill="none" stroke="#5a7a97" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M 1040 228 L 1155 228"/>
    <path d="M 1537 228 C 1615 316, 1615 580, 1537 668"/>
    <path d="M 1155 668 L 1040 668"/>
    <path d="M 660 668 L 550 668"/>
  </g>

  <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800">
    <text x="602" y="228" text-anchor="middle" dominant-baseline="middle" font-size="56" fill="#5f6fb8">&#215;</text>
  </g>

  <!-- Context Layer -->
  <g transform="translate(170 110)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="18" y="16" width="164" height="92" rx="22" fill="#cfe0ff" stroke="#4f78ea" stroke-width="1.9"/>
      <use href="#icon-stem" transform="translate(100 40) scale(1.05)"/>
      <text x="100" y="82" text-anchor="middle" font-size="23.5" dominant-baseline="middle">STEM</text>

      <rect x="198" y="16" width="164" height="92" rx="22" fill="#ffd6d6" stroke="#e15454" stroke-width="1.9"/>
      <use href="#icon-med" transform="translate(280 40) scale(1.05)"/>
      <text x="280" y="82" text-anchor="middle" font-size="20.2" dominant-baseline="middle">Health/Med</text>

      <rect x="18" y="128" width="164" height="92" rx="22" fill="#ead2ff" stroke="#9f52f0" stroke-width="1.9"/>
      <use href="#icon-social" transform="translate(100 152) scale(1.05)"/>
      <text x="100" y="194" text-anchor="middle" font-size="18.8" dominant-baseline="middle">Social Science</text>

      <rect x="198" y="128" width="164" height="92" rx="22" fill="#e6f5c7" stroke="#8fbe2e" stroke-width="1.9"/>
      <use href="#icon-humanities" transform="translate(280 154) scale(1.05)"/>
      <text x="280" y="194" text-anchor="middle" font-size="21" dominant-baseline="middle">Humanities</text>
    </g>
  </g>

  <!-- Verifiability -->
  <g transform="translate(660 110)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="24" y="30" width="332" height="78" rx="22" fill="#d4f0e1" stroke="#4ea887" stroke-width="1.9"/>
      <text x="190" y="58" text-anchor="middle" font-size="22.5" fill="#111111">With</text>
      <text x="190" y="82" text-anchor="middle" font-size="31.5" dominant-baseline="middle">Ground Truth</text>

      <rect x="24" y="128" width="332" height="78" rx="22" fill="#e2d8ff" stroke="#7f66e0" stroke-width="1.9"/>
      <text x="190" y="156" text-anchor="middle" font-size="22.5" fill="#111111">Without</text>
      <text x="190" y="180" text-anchor="middle" font-size="31.5" dominant-baseline="middle">Ground Truth</text>
    </g>
  </g>

  <!-- Ethos Pathos Logos -->
  <g transform="translate(1179 56)" filter="url(#softShadow)" font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700">
    <rect width="332" height="56" rx="22" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <rect x="11" y="9" width="100" height="38" rx="18" fill="#d2e2ff" stroke="#4f7fe0" stroke-width="1.5"/>
    <rect x="116" y="9" width="100" height="38" rx="18" fill="#ead2ff" stroke="#a755de" stroke-width="1.5"/>
    <rect x="221" y="9" width="100" height="38" rx="18" fill="#d3f0df" stroke="#3eab7b" stroke-width="1.5"/>
    <text x="61" y="33" text-anchor="middle" font-size="20.2" fill="#111111">ethos</text>
    <text x="166" y="33" text-anchor="middle" font-size="20.2" fill="#111111">pathos</text>
    <text x="271" y="33" text-anchor="middle" font-size="20.2" fill="#111111">logos</text>
  </g>

  <!-- Trigger Layer -->
  <g transform="translate(1155 110)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="24" y="24" width="154" height="40" rx="15" fill="#c9dbff" stroke="#2f67e7" stroke-width="1.7"/>
      <rect x="202" y="24" width="154" height="40" rx="15" fill="#e5cbff" stroke="#8d42ee" stroke-width="1.7"/>
      <rect x="24" y="72" width="154" height="40" rx="15" fill="#c5f5ef" stroke="#00b6a3" stroke-width="1.7"/>
      <rect x="202" y="72" width="154" height="40" rx="15" fill="#d8f4bf" stroke="#5bbd1f" stroke-width="1.7"/>
      <rect x="24" y="120" width="154" height="40" rx="15" fill="#ffc9f8" stroke="#d127e4" stroke-width="1.7"/>
      <rect x="202" y="120" width="154" height="40" rx="15" fill="#ffd7ac" stroke="#ef8610" stroke-width="1.7"/>
      <rect x="24" y="168" width="154" height="40" rx="15" fill="#ffec8d" stroke="#c4aa00" stroke-width="1.7"/>
      <rect x="202" y="168" width="154" height="40" rx="15" fill="#ffcfae" stroke="#ef6412" stroke-width="1.7"/>

      <text x="101" y="44" text-anchor="middle" font-size="20.8" dominant-baseline="middle">authority</text>
      <text x="279" y="44" text-anchor="middle" font-size="20.8" dominant-baseline="middle">social proof</text>
      <text x="101" y="92" text-anchor="middle" font-size="20.8" dominant-baseline="middle">consistency</text>
      <text x="279" y="92" text-anchor="middle" font-size="20.8" dominant-baseline="middle">reciprocity</text>
      <text x="101" y="140" text-anchor="middle" font-size="20.8" dominant-baseline="middle">liking</text>
      <text x="279" y="140" text-anchor="middle" font-size="20.8" dominant-baseline="middle">scarcity</text>
      <text x="101" y="188" text-anchor="middle" font-size="20.8" dominant-baseline="middle">unity</text>
      <text x="279" y="188" text-anchor="middle" font-size="20.8" dominant-baseline="middle">simple</text>
    </g>
  </g>

  <!-- Change Mechanism -->
  <g transform="translate(170 550)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="24" y="24" width="332" height="58" rx="18" fill="#d3e1ff" stroke="#5b80cf" stroke-width="1.9"/>
      <text x="190" y="53" text-anchor="middle" font-size="27.5" dominant-baseline="middle">Compliance</text>

      <rect x="24" y="90" width="332" height="58" rx="18" fill="#d3efe4" stroke="#479f88" stroke-width="1.9"/>
      <text x="190" y="119" text-anchor="middle" font-size="26.5" dominant-baseline="middle">Identification</text>

      <rect x="24" y="156" width="332" height="58" rx="18" fill="#e1d8ff" stroke="#785fda" stroke-width="1.9"/>
      <text x="190" y="185" text-anchor="middle" font-size="25.5" dominant-baseline="middle">Internalization</text>
    </g>
  </g>

  <!-- Ingratiation Types -->
  <g transform="translate(660 550)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="24" y="24" width="332" height="58" rx="18" fill="#cceee4" stroke="#43a18f" stroke-width="1.9"/>
      <text x="190" y="53" text-anchor="middle" font-size="26" dominant-baseline="middle">Flatter others</text>

      <rect x="24" y="90" width="332" height="58" rx="18" fill="#ddd6ff" stroke="#765fda" stroke-width="1.9"/>
      <text x="190" y="119" text-anchor="middle" font-size="24" dominant-baseline="middle">Opinion Conformity</text>

      <rect x="24" y="156" width="332" height="58" rx="18" fill="#d0e4ff" stroke="#5d8fd0" stroke-width="1.9"/>
      <text x="190" y="185" text-anchor="middle" font-size="25" dominant-baseline="middle">Self-presentation</text>
    </g>
  </g>

  <!-- Evaluation -->
  <g transform="translate(1155 550)" filter="url(#shadow)">
    <rect width="380" height="236" rx="32" fill="url(#cardFill)" stroke="#5f7a8f" stroke-width="2.3"/>
    <g font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
      <rect x="24" y="22" width="332" height="56" rx="18" fill="#e2ecff" stroke="#6c8bd0" stroke-width="1.8"/>
      <rect x="50" y="36" width="26" height="18" rx="9" fill="#a8bef9"/>
      <rect x="88" y="36" width="26" height="18" rx="9" fill="#779bf3"/>
      <rect x="126" y="36" width="26" height="18" rx="9" fill="#4a7cf0"/>
      <path d="M 76 45 L 88 45" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M 114 45 L 126 45" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="262" y="50" text-anchor="middle" font-size="21.2" dominant-baseline="middle">Simple repetition</text>

      <rect x="24" y="90" width="332" height="56" rx="18" fill="#ebe4ff" stroke="#8a75dd" stroke-width="1.8"/>
      <rect x="46" y="104" width="30" height="18" rx="9" fill="#4a7cf0"/>
      <rect x="88" y="104" width="30" height="18" rx="9" fill="#9d58f4"/>
      <rect x="130" y="104" width="30" height="18" rx="9" fill="#4bbd3e"/>
      <path d="M 76 113 L 88 113" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M 118 113 L 130 113" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="262" y="118" text-anchor="middle" font-size="21.2" dominant-baseline="middle">Combined triggers</text>

      <rect x="24" y="158" width="332" height="56" rx="18" fill="#dff4ed" stroke="#58a795" stroke-width="1.8"/>
      <rect x="46" y="174" width="22" height="14" rx="7" fill="#91e9de"/>
      <rect x="84" y="171" width="28" height="20" rx="10" fill="#4fe0cf"/>
      <rect x="128" y="167" width="36" height="28" rx="14" fill="#0fc4b5"/>
      <path d="M 68 181 L 84 181" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M 112 181 L 128 181" fill="none" stroke="#5a7a97" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="262" y="186" text-anchor="middle" font-size="21.2" dominant-baseline="middle">Increasing tones</text>
    </g>
  </g>

  <!-- Phase labels -->
  <g filter="url(#softShadow)" font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="700" fill="#111111">
    <rect x="255" y="366" width="210" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="360" y="400" text-anchor="middle" font-size="22" dominant-baseline="middle">Context Layer</text>

    <rect x="745" y="366" width="210" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="850" y="400" text-anchor="middle" font-size="22" dominant-baseline="middle">Verifiability</text>

    <rect x="1240" y="366" width="210" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="1345" y="400" text-anchor="middle" font-size="22" dominant-baseline="middle">Trigger Layer</text>

    <rect x="220" y="806" width="280" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="360" y="840" text-anchor="middle" font-size="22" dominant-baseline="middle">Capitulation Mechanism</text>

    <rect x="725" y="806" width="250" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="850" y="840" text-anchor="middle" font-size="22" dominant-baseline="middle">Ingratiation Types</text>

    <rect x="1240" y="806" width="210" height="56" rx="18" fill="#f4f7fc" stroke="#5f7a8f" stroke-width="2"/>
    <text x="1345" y="840" text-anchor="middle" font-size="22" dominant-baseline="middle">Temporal Layer</text>
  </g>

  <!-- Theory tags -->
  <g filter="url(#softShadow)" font-family="'Aptos','Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" fill="#111111" text-anchor="middle">
    <rect x="294" y="438" width="132" height="38" rx="19" fill="#d5c3cf" stroke="#8ba0b2" stroke-width="1.9"/>
    <text x="360" y="463" font-size="15.4" letter-spacing="1.3">OECD FORD</text>

    <rect x="1269" y="438" width="152" height="38" rx="19" fill="#7fb9c8" stroke="#7f9fb5" stroke-width="1.9"/>
    <text x="1345" y="463" font-size="16.2" letter-spacing="1.5">CIALDINI</text>

    <rect x="784" y="878" width="132" height="38" rx="19" fill="#9e8fe0" stroke="#8398b1" stroke-width="1.9"/>
    <text x="850" y="903" font-size="16.2" letter-spacing="1.6">JONES</text>

    <rect x="294" y="878" width="132" height="38" rx="19" fill="#6fcf82" stroke="#5f9e71" stroke-width="1.9"/>
    <text x="360" y="903" font-size="16.2" letter-spacing="1.6">KELMAN</text>
  </g>
</svg>
